; Example Environment Inventory
; ==============================
; Copy this file to create a new environment (e.g., myenv/hosts.ini)
; This is a template showing the required structure

[local]
localhost ansible_connection=local

; K3s Master Nodes (Control Plane)
; Add your master node IPs here
[master]
; 192.168.1.10
; 192.168.1.11

; K3s Worker Nodes
; Add your worker node IPs here
[node]
; 192.168.1.20
; 192.168.1.21

; K3s Cluster Group (combines master + node)
[k3s_cluster:children]
master
node

; Proxmox Hosts (if using Proxmox)
; Uncomment and add IPs if using Proxmox
[proxmox]
; 192.168.1.5

; Create group_vars/all.yml for environment-specific settings
; See inventory/dev/group_vars/all.yml for examples
