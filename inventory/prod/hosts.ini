; Production Environment Inventory
; =================================
; This is the PRODUCTION environment inventory
; Update with your actual production host IPs
; WARNING: Be extra careful with changes to this environment
; Common variables are defined in inventory/group_vars/

[local]
localhost ansible_connection=local

; K3s Master Nodes (Control Plane) - High Availability Setup
; Minimum 3 masters for production HA
; Example: 10.0.0.10 ansible_user=ansible
[master]
172.16.10.50

; K3s Worker Nodes
; Add as many workers as needed for your workload
; Example: 10.0.0.20 ansible_user=ansible
[node]
172.16.10.72
172.16.10.71
172.16.10.70
172.16.10.69
172.16.10.68
172.16.10.67
172.16.10.66
172.16.10.65
172.16.10.64
172.16.10.63
172.16.10.62
172.16.10.55
172.16.10.54
172.16.10.53
172.16.10.52
172.16.10.51

; K3s Cluster Group (combines master + node)
[k3s_cluster:children]
master
node

; Proxmox Hosts (if using Proxmox)
; Example: 10.0.0.5 ansible_user=root
[proxmox]

; Production-specific: stricter SSH settings
[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts_prod'
