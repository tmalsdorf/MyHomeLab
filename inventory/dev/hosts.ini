; Dev Environment Inventory
; ========================
; This is the DEVELOPMENT environment inventory
; Update with your actual dev host IPs
; Common variables are defined in inventory/group_vars/

[local]
localhost ansible_connection=local

; K3s Master Nodes (Control Plane)
; Example: 192.168.1.10 ansible_user=ansible
[master]
172.16.10.87

; K3s Worker Nodes
; Example: 192.168.1.11 ansible_user=ansible
[node]
172.16.10.86
172.16.10.85
172.16.10.84
172.16.10.83
172.16.10.82
172.16.10.81
172.16.10.80
172.16.10.79
172.16.10.78
172.16.10.77
172.16.10.76

; K3s Cluster Group (combines master + node)
[k3s_cluster:children]
master
node

; Proxmox Hosts (if using Proxmox)
; Example: 192.168.1.5 ansible_user=root
[proxmox]
