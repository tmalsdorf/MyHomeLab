---
# Global variables applied to all hosts
# =====================================

# Environment settings
environment: "{{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}"

# SSH configuration
ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('ansible', true) }}"
ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY') | default('~/.ssh/id_rsa', true) }}"
ansible_python_interpreter: /usr/bin/python3

# Timezone
system_timezone: "{{ lookup('env', 'SYSTEM_TZ') | default('America/Chicago', true) }}"

# Feature flags (read from environment)
k3s_enabled: "{{ lookup('env', 'K3S_ENABLED') | default('false', true) | bool }}"
portainer_enabled: "{{ lookup('env', 'PORTAINER_ENABLED') | default('false', true) | bool }}"

# Proxy settings (optional)
# proxy_env:
#   http_proxy: "http://proxy.example.com:8080"
#   https_proxy: "http://proxy.example.com:8080"
#   no_proxy: "localhost,127.0.0.1,.example.com"
