---
# UAT Environment - Global Variables
# ==================================

# Environment identification
environment: uat
env_name: "UAT/Staging"

# K3s settings for UAT
k3s_version: v1.27.4+k3s1
k3s_release_channel: stable
k3s_state: present
k3s_build_cluster: true
proxmox_lxc_configure: false

# System settings
system_timezone: "America/Chicago"
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# UAT flags (balance between dev and prod)
debug_mode: false
skip_verification: false

# ArgoCD settings for UAT
argocd_namespace: argocd
argocd_server_host: "argocd-uat.local"

# Portainer settings for UAT
portainer_port: 9000

# Network settings for UAT (moderate security)
firewall_enabled: true
firewall_allowed_ports:
  - 22
  - 80
  - 443
  - 6443  # K3s API
  - 2379  # etcd
  - 2380  # etcd peer
  - 10250 # Kubelet
  - 8472  # Flannel VXLAN
