; UAT Environment Inventory
; ==========================
; This is the UAT/STAGING environment inventory
; Update with your actual UAT host IPs
; Common variables are defined in inventory/group_vars/

[local]
localhost ansible_connection=local

; K3s Master Nodes (Control Plane)
; Example: 10.0.1.10 ansible_user=ansible
[master]

; K3s Worker Nodes
; Example: 10.0.1.11 ansible_user=ansible
[node]

; K3s Cluster Group (combines master + node)
[k3s_cluster:children]
master
node

; Proxmox Hosts (if using Proxmox)
; Example: 10.0.1.5 ansible_user=root
[proxmox]
