---
- name: Install Cert-Manager on Kubernetes Cluster
  block:
    - name: Check if cert-manager namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: cert-manager
      register: cert_manager_namespace

    - name: Install cert-manager (CRDs + controllers) from upstream manifest
      kubernetes.core.k8s:
        state: present
        apply: true
        definition: >-
          {{ lookup('url',
                    'https://github.com/cert-manager/cert-manager/releases/download/v1.13.3/cert-manager.yaml',
                    split_lines=False)
             | from_yaml_all | list }}
      when: (cert_manager_namespace.resources | default([])) | length == 0

    - name: Wait for cert-manager Deployments to be Available
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: "{{ item }}"
        namespace: cert-manager
        wait: true
        wait_timeout: 300
        wait_condition:
          type: Available
          status: "True"
      loop:
        - cert-manager
        - cert-manager-cainjector
        - cert-manager-webhook

- name: Create Let's Encrypt ClusterIssuer
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('template', 'cluster_issuer.yml.j2') | from_yaml }}"

- name: Create Example Certificate
  kubernetes.core.k8s:
    state: present
    apply: true
