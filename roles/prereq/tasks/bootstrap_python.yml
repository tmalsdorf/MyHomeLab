---
- name: Check if python3 is available
  ansible.builtin.raw: python3 --version
  register: python3_check
  ignore_errors: true
  changed_when: false

- name: Install python3 via raw (no Python required)
  ansible.builtin.raw: |
    apt-get update -qq && apt-get install -y python3 python3-apt
  when: python3_check.rc != 0
  changed_when: true
