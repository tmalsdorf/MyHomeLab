---
- name: Homelab localhost Setup elevated privileges
  hosts: localhost
  gather_facts: true
  roles:
    - role: prereq
      become: true
    - role: k3s
      become: true
      when: lookup('env', 'K3S_ENABLED') == 'true'

- name: Set global condition based on K3S_ENABLED environment variable
  hosts: all
  gather_facts: false
  tasks:
    - name: Determine if K3S is enabled
      set_fact:
        k3s_enabled: "{{ lookup('env', 'K3S_ENABLED') == 'true' }}"
      run_once: true

- name: Prepare Proxmox cluster
  hosts: proxmox
  gather_facts: true
  become: true
  environment: "{{ proxy_env | default({}) }}"
  roles:
    - role: techno_tim.k3s_ansible.proxmox_lxc
      when: k3s_enabled and proxmox_lxc_configure

- name: Prepare k3s cluster nodes
  hosts: k3s_cluster
  gather_facts: true
  become: true
  environment: "{{ proxy_env | default({}) }}"
  roles:
    - role: prereq
      become: true
    - role: k3s_prereq
      when: k3s_enabled 
  tags:
    - deploy_k3s_prereq

- name: Prepare k3s nodes
  hosts: k3s_cluster
  gather_facts: true
  environment: "{{ proxy_env | default({}) }}"
  become: true
  roles:
    - role: techno_tim.k3s_ansible.lxc
      when: k3s_enabled and proxmox_lxc_configure
    - role: techno_tim.k3s_ansible.prereq
      when: k3s_enabled
    - role: techno_tim.k3s_ansible.download
      when: k3s_enabled
    - role: techno_tim.k3s_ansible.raspberrypi
      when: k3s_enabled
    - role: techno_tim.k3s_ansible.k3s_custom_registries
      when: k3s_enabled and custom_registries
  tags:
    - deploy_k3s_nodes

- name: Setup k3s servers
  hosts: master
  environment: "{{ proxy_env | default({}) }}"
  become: true
  roles:
    - role: techno_tim.k3s_ansible.k3s_server
      when: k3s_enabled

- name: Setup k3s agents
  hosts: node
  environment: "{{ proxy_env | default({}) }}"
  become: true
  roles:
    - role: techno_tim.k3s_ansible.k3s_agent
      when: k3s_enabled
  tags:
    - deploy_k3s_agents


- name: Configure k3s cluster
  hosts: master
  environment: "{{ proxy_env | default({}) }}"
  become: true
  roles:
    - role: techno_tim.k3s_ansible.k3s_server_post
      when: k3s_enabled
  tags:
    - deploy_k3s_cluster

- name: Retrieve K3s cluster configuration
  hosts: localhost
  gather_facts: no
  vars:
    master_ip: "{{ lookup('env', 'K3S_MASTERS') }}"
    master_user: "{{ lookup('env', 'K3S_USERNAME') }}"
    context: "{{ lookup('env', 'K3S_CONTEXT') }}"
    ssh_key_path: "~/.ssh/id_rsa"
    kube_config_path: "~/.kube/config"
    k3s_enabled: "{{ lookup('env', 'K3S_ENABLED') | bool }}"
  tasks:
    - name: Ensure .kube directory exists locally
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0755'
      delegate_to: localhost
      when: k3s_enabled

    - name: Ensure kube config file exists locally
      ansible.builtin.file:
        path: "{{ kube_config_path }}"
        state: touch
      delegate_to: localhost
      when: k3s_enabled

    - name: Check if context exists in kubectl
      shell: kubectl config get-contexts -o name | grep -w {{ context }}
      register: context_check
      ignore_errors: true
    
    - name: Remove context if it exists
      shell: kubectl config delete-context {{ context }}
      when: context_check.rc == 0

    - name: Retrieve K3s cluster configuration from master
      ansible.builtin.command:
        cmd: "k3sup install --user {{ master_user }} --skip-install --host {{ master_ip }} --context {{ context }} --local-path {{ kube_config_path }} "
      when: k3s_enabled

- name: Install cert-manager
  hosts: k3s_cluster
  roles:
    - k3s
    - cert_manager

- name: Configure argocd
  hosts: localhost
  vars:
    ssh_key_path: "~/.ssh/id_rsa"
    kube_config_path: "~/.kube/config"
    k3s_enabled: "{{ lookup('env', 'K3S_ENABLED') | bool }}"
  roles:
    - role: argocd
  tags:
    - deploy_argocd

- name: deploy portainer if enabled
  hosts: localhost
  #gather_facts: true
  roles: 
    - role: portainer
      when: lookup('env', 'PORTAINER_ENABLED') == 'true'
  tags:
    - deploy_portainer
     

